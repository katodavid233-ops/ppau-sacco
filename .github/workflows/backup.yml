name: Cloudflare Backup

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Backup DNS Records
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          mkdir -p backup
          HTTP_CODE=$(curl -s -o backup/dns-records.json -w "%{code}" \
            -X GET "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "DNS backup complete"
          else
            echo "DNS backup skipped (HTTP $HTTP_CODE) - add Zone:DNS permission to token"
            echo '{"error":"DNS permission missing"}' > backup/dns-records.json
          fi

      - name: Backup KV Store
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          mkdir -p backup/kv
          curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/keys?per_page=1000" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -o backup/kv/keys.json

          grep -o '"name":"[^"]*"' backup/kv/keys.json 2>/dev/null | sed 's/"name":"//;s/"//' | while read key; do
            SAFE_NAME=$(echo "$key" | tr '/:' '_-')
            curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/storage/kv/namespaces/${CF_KV_NAMESPACE_ID}/values/${key}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -o "backup/kv/${SAFE_NAME}.json" || true
          done
          echo "KV backup complete"

      - name: Backup Worker Scripts
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          mkdir -p backup/workers
          curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -o /tmp/scripts.json

          grep -o '"id":"[^"]*"' /tmp/scripts.json 2>/dev/null | sed 's/"id":"//;s/"//' | while read script_id; do
            if [ -n "$script_id" ]; then
              curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${script_id}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -o "backup/workers/${script_id}.js" || true
            fi
          done
          echo "Worker backup complete"

      - name: Commit Backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup/
          git diff --cached --quiet || git commit -m "Cloudflare backup $(date -u '+%Y-%m-%d')"
          git push
