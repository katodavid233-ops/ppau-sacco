name: Deploy to Namecheap cPanel

on:
  push:
    branches:
      - main  # triggers every time you push to main

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed for changed-files detection

      - name: Deploy via FTP to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Change this to match your cPanel public folder
          server-dir: /public_html/
          # Only upload files that changed — faster deploys
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/worker/**
            **/tests/**
            **/.vscode/**
            .gitignore
            README.md
