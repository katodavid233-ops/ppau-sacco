name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Debug secrets
        run: |
          echo "CF_ACCOUNT_ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "CF_API_TOKEN length: ${#CLOUDFLARE_API_TOKEN}"

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy . --project-name=ppau-sacco --branch=main --commit-dirty=true --log-level=debug
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
