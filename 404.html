<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | PPAU SACCO</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; background:var(--gray-50); }

    .error-code { font-size:8rem; font-weight:900; color:var(--green-800); line-height:1; opacity:0.15; }
    .error-container h1 { font-size:1.8rem; font-weight:800; color:var(--gray-900); margin:16px 0 12px; }
    .error-container p { color:var(--gray-500); margin-bottom:32px; font-size:1rem; line-height:1.6; }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Please check the URL or return to the homepage.</p>
    <a href="index.html" class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

</html>
